services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: edge_ai_backend
    # Map the FastAPI port AND the port QEMU expects for telemetry (8080)
    ports:
      - "8000:8000"
      - "8080:8080"
    volumes:
      - ./backend:/app/backend
      - ./ai:/app/ai
      - ./telemetry.db:/app/telemetry.db
    # We mount telemetry.db to preserve it across restarts.
    # The default command runs uvicorn on :8000. We also need to run telemetry_server.py on :8080.
    # We can override the command to use a small shell script that runs both.
    command: >
      sh -c "python3 backend/telemetry_server.py & python3 -m uvicorn backend.api:app --host 0.0.0.0 --port 8000"
    networks:
      - edge_ai_net
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: edge_ai_frontend
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    networks:
      - edge_ai_net
    depends_on:
      - backend
    restart: unless-stopped

networks:
  edge_ai_net:
    driver: bridge
